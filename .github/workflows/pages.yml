name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate env.js from secret
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PAGE_URL: https://bepro-aiml.github.io/aiml-platform
        run: |
          printf 'window.ENV = {\n  "OPENROUTER_API_KEY": "%s",\n  "OPENROUTER_MODEL": "qwen/qwen-2.5-7b-instruct",\n  "OPENROUTER_REFERER": "%s",\n  "OPENROUTER_TITLE": "AI/ML Fundamentals"\n};\n' "${OPENROUTER_API_KEY}" "${PAGE_URL}" > env.js
          ls -la env.js
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
